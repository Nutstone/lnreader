<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kokoro TTS Host</title>
<style>
  body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; font-size: 12px; }
  #status { padding: 8px; opacity: 0.6; }
</style>
</head>
<body>
<div id="status">Kokoro TTS host — initialising…</div>
<script>
/*
  Kokoro TTS host page.

  This page runs inside a hidden RN WebView. The RN side posts JSON
  messages of the form:

    { type: 'init', modelDtype: 'q8' | 'q8f16' | 'fp16' | 'q4' }
    { type: 'synthesize', id, text, voice, speed }
    { type: 'dispose' }

  The page emits:

    { type: 'ready' }
    { type: 'progress', loaded, total }
    { type: 'audio', id, sampleRate, pcmBase64, durationMs }
    { type: 'error', id?, message }

  Audio is returned as 16-bit-PCM WAV bytes encoded in base64 — the RN
  side writes it to a file and hands the file URI to expo-av.

  Loaded by services/audiobook/renderers/KokoroWebViewRenderer.ts.
*/

(function () {
  var post = function (msg) {
    try {
      window.ReactNativeWebView.postMessage(JSON.stringify(msg));
    } catch (e) {
      console.error('postMessage failed:', e);
    }
  };

  var setStatus = function (s) {
    var el = document.getElementById('status');
    if (el) el.textContent = s;
  };

  var tts = null;

  async function ensureLoaded(modelDtype) {
    if (tts) return tts;
    setStatus('Loading kokoro-js …');
    // kokoro-js is bundled by the RN side via metro/babel and made
    // available via a `window.kokoroJs` shim. If not present, fall back
    // to dynamic import from a relative URL.
    var KokoroTTS;
    if (window.kokoroJs && window.kokoroJs.KokoroTTS) {
      KokoroTTS = window.kokoroJs.KokoroTTS;
    } else {
      var mod = await import('./kokoro-js.bundle.js');
      KokoroTTS = mod.KokoroTTS;
    }
    setStatus('Downloading model…');
    tts = await KokoroTTS.from_pretrained('onnx-community/Kokoro-82M-v1.0-ONNX', {
      dtype: modelDtype || 'q8f16',
      progress_callback: function (p) {
        post({ type: 'progress', loaded: p.loaded || 0, total: p.total || 0, status: p.status || '' });
      },
    });
    setStatus('Ready');
    post({ type: 'ready' });
    return tts;
  }

  // Convert a Float32Array PCM to a 16-bit WAV ArrayBuffer.
  function floatsToWav(samples, sampleRate) {
    var numChannels = 1;
    var bytesPerSample = 2;
    var dataLen = samples.length * bytesPerSample;
    var buffer = new ArrayBuffer(44 + dataLen);
    var view = new DataView(buffer);
    function writeStr(off, s) {
      for (var i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i));
    }
    writeStr(0, 'RIFF');
    view.setUint32(4, 36 + dataLen, true);
    writeStr(8, 'WAVE');
    writeStr(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true); // PCM
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * numChannels * bytesPerSample, true);
    view.setUint16(32, numChannels * bytesPerSample, true);
    view.setUint16(34, 16, true);
    writeStr(36, 'data');
    view.setUint32(40, dataLen, true);

    var off = 44;
    for (var i = 0; i < samples.length; i++) {
      var s = Math.max(-1, Math.min(1, samples[i]));
      view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7fff, true);
      off += 2;
    }
    return buffer;
  }

  function arrayBufferToBase64(buffer) {
    var bytes = new Uint8Array(buffer);
    var CHUNK = 0x8000;
    var bin = '';
    for (var i = 0; i < bytes.length; i += CHUNK) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
    }
    return btoa(bin);
  }

  async function synthesize(req) {
    try {
      var t = await ensureLoaded(req.modelDtype);
      setStatus('Rendering segment…');
      var audio = await t.generate(req.text, {
        voice: req.voice,
        speed: req.speed || 1.0,
      });
      // kokoro-js audio is { audio: Float32Array, sampling_rate: number }
      var samples = audio.audio || audio;
      var sampleRate = audio.sampling_rate || audio.sample_rate || 24000;
      var wav = floatsToWav(samples, sampleRate);
      var pcmBase64 = arrayBufferToBase64(wav);
      var durationMs = Math.round((samples.length / sampleRate) * 1000);
      post({
        type: 'audio',
        id: req.id,
        sampleRate: sampleRate,
        pcmBase64: pcmBase64,
        durationMs: durationMs,
      });
    } catch (e) {
      post({ type: 'error', id: req.id, message: (e && e.message) || String(e) });
    }
  }

  document.addEventListener('message', onRNMessage); // iOS
  window.addEventListener('message', onRNMessage); // Android

  function onRNMessage(ev) {
    var raw = typeof ev.data === 'string' ? ev.data : ev.data && ev.data.toString();
    if (!raw) return;
    var msg;
    try {
      msg = JSON.parse(raw);
    } catch (e) {
      post({ type: 'error', message: 'malformed: ' + raw });
      return;
    }
    if (msg.type === 'init') {
      ensureLoaded(msg.modelDtype).catch(function (e) {
        post({ type: 'error', message: e && e.message ? e.message : String(e) });
      });
    } else if (msg.type === 'synthesize') {
      synthesize(msg);
    } else if (msg.type === 'dispose') {
      tts = null;
      setStatus('Disposed');
    }
  }

  // Also listen for `window.audiobookKokoro = { synthesize: fn }` so
  // tests that don't go through postMessage can drive synthesis.
  window.audiobookKokoro = { synthesize: synthesize, ensureLoaded: ensureLoaded };
})();
</script>
</body>
</html>
